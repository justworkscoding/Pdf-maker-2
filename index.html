<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>DocForge</title>

    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="./style.css">

</head>

<body>

    <header class="topbar">
        <div>
            <h1>DocForge</h1>
            <p>Professional HTML → PDF Generator</p>
        </div>
    </header>

    <main class="app">

        <!-- Editor -->
        <section class="editor">

            <div class="section-title">
                HTML Editor
            </div>

            <textarea
                id="htmlInput"
                spellcheck="false"
                autocapitalize="off"
                autocomplete="off"
                autocorrect="off"
                placeholder="Paste the complete HTML generated by ChatGPT here..."></textarea>

            <div class="toolbar">

                <button id="clearBtn" type="button">
                    Clear
                </button>

                <button id="printBtn" type="button">
                    Print PDF
                </button>

            </div>

        </section>

        <!-- Preview -->

        <section class="previewSection">

            <div class="section-title">
                A4 Preview
            </div>

            <div id="paper">

                <div id="preview">

                    <!-- ChatGPT HTML will be rendered here -->

                </div>

            </div>

        </section>

    </main>

    <!-- Main JavaScript -->
    <script src="./script.js" defer></script>

</body>

  </html>
